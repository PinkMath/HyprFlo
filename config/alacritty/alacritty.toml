# ── Environment ──────────────────────────────────────────────────────────
[env]
TERM = "xterm-256color"

# ── Window ───────────────────────────────────────────────────────────────
[window]
padding = { x = 6, y = 6 }
dynamic_padding = true

# ── Cursor & Selection Colours ───────────────────────────────────────────
[colors.cursor]
cursor = "#528bff"
text   = "#9cdef2"

[colors.selection]
text       = "#9cdef2"
background = "#3e4451"

# ── Primary Colours ──────────────────────────────────────────────────────
[colors.primary]
background = "#282c34"
foreground = "#9cdef2"

# ── Normal ANSI Palette ──────────────────────────────────────────────────
[colors.normal]
black   = "#2e3440"
red     = "#e06c75"
green   = "#9cdef2"
yellow  = "#e5c07b"
blue    = "#61afef"
magenta = "#c678dd"
cyan    = "#9cdef2"
white   = "#828997"

# ── Font Settings ────────────────────────────────────────────────────────
[font]
size = 14.0

[font.normal]
family = "JetBrainsMono Nerd Font"
style  = "Regular"

[font.bold]
family = "JetBrainsMono Nerd Font"
style  = "Bold"

[font.italic]
family = "JetBrainsMono Nerd Font"
style  = "Italic"

[font.bold_italic]
family = "JetBrainsMono Nerd Font"
style  = "Bold Italic"

# ── Mouse ────────────────────────────────────────────────────────────────
[mouse]
hide_when_typing = true
