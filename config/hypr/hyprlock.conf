background {
    monitor =
    path = screenshot
    blur_passes = 3
    blur_size = 8
    noise = 0.0117
    contrast = 0.8916
    brightness = 0.8172
    vibrancy = 0.1696
    vibrancy_darkness = 0.0
}

input-field {
    monitor =
    size = 260, 48
    outline_thickness = 2

    dots_size = 0.25
    dots_spacing = 0.25
    dots_center = true

    outer_color = rgba(ffffff22)
    inner_color = rgba(11111188)
    font_color = rgb(ffffff)

    fade_on_empty = false
    placeholder_text = Password...

    check_color = rgb(89b4fa)
    fail_color = rgb(f38ba8)

    position = 0, -40
    halign = center
    valign = center
}

label {
    monitor =
    text = cmd[update:1000] echo "$(date +"%H:%M")"
    color = rgb(ffffff)
    font_size = 64
    font_family = JetBrainsMono Nerd Font

    position = 0, 80
    halign = center
    valign = center
}

label {
    monitor =
    text = HyprFlo
    color = rgba(ffffff99)
    font_size = 18
    font_family = JetBrainsMono Nerd Font

    position = 0, 30
    halign = center
    valign = center
}
