### HYPRLOCK ###

# HyprFlo Retro lock screen

background {
    monitor =
    path = screenshot

    blur_passes = 2
    blur_size = 5

    noise = 0.025
    contrast = 0.95
    brightness = 0.62
    vibrancy = 0.12
    vibrancy_darkness = 0.15
}

label {
    monitor =
    text = HyprFlo
    color = rgba(9ece6aff)
    font_size = 22
    font_family = JetBrainsMono Nerd Font

    position = 0, 150
    halign = center
    valign = center
}

label {
    monitor =
    text = cmd[update:1000] echo "$(date +"%H:%M")"
    color = rgba(e0af68ff)
    font_size = 72
    font_family = JetBrainsMono Nerd Font

    position = 0, 70
    halign = center
    valign = center
}

label {
    monitor =
    text = cmd[update:60000] echo "$(date +"%A, %d %B")"
    color = rgba(c0caf5cc)
    font_size = 16
    font_family = JetBrainsMono Nerd Font

    position = 0, 18
    halign = center
    valign = center
}

input-field {
    monitor =
    size = 290, 48
    outline_thickness = 2

    dots_size = 0.25
    dots_spacing = 0.25
    dots_center = true

    outer_color = rgba(9ece6aff)
    inner_color = rgba(11111bdd)
    font_color = rgba(c0caf5ff)

    fade_on_empty = false
    placeholder_text = <span foreground="##565f89">enter password...</span>

    check_color = rgba(e0af68ff)
    fail_color = rgba(f7768eff)

    position = 0, -70
    halign = center
    valign = center
}
