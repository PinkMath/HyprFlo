### LOOK AND FEEL ###

general {
    gaps_in = 20
    gaps_out = 30
    border_size = 2

    col.active_border = rgba(9ece6aff) rgba(e0af68ff) 45deg
    col.inactive_border = rgba(1f1f28cc)

    resize_on_border = true
    allow_tearing = false
    layout = dwindle
}

decoration {
    rounding = 4

    active_opacity = 1.0
    inactive_opacity = 0.90

    dim_inactive = true
    dim_strength = 0.14
    dim_around = 0.32

    shadow {
        enabled = true
        range = 12
        render_power = 3
        color = rgba(000000aa)
        color_inactive = rgba(00000066)
    }

    blur {
        enabled = true
        size = 3
        passes = 1
        new_optimizations = true
        xray = false
        popups = true
    }
}

animations {
    enabled = yes

    bezier = retroOut, 0.05, 0.75, 0.25, 1.0
    bezier = retroIn, 0.30, 0.00, 0.40, 1.00
    bezier = retroFade, 0.25, 0.10, 0.25, 1.00

    animation = windows, 1, 3, retroOut, popin 90%
    animation = windowsIn, 1, 3, retroOut, popin 90%
    animation = windowsOut, 1, 2, retroIn, popin 96%
    animation = windowsMove, 1, 3, retroOut, slide
    animation = fade, 1, 2, retroFade
    animation = workspaces, 1, 3, retroOut, slide
}

gesture = 3, horizontal, workspace
gesture = 3, vertical, fullscreen

master {
    new_status = master
}

xwayland {
    force_zero_scaling = true
}

misc {
    disable_hyprland_logo = true
    disable_splash_rendering = true
    force_default_wallpaper = 0

    animate_manual_resizes = false

    enable_swallow = true
    swallow_regex = ^(kitty)$
}
