#####################
### LOOK AND FEEL ###
#####################

# HyprFlo retro style
# Safe version for your current Hyprland config.
# No unsupported dwindle.pseudotile or gestures.workspace_swipe options.

general {
    gaps_in = 5
    gaps_out = 12
    border_size = 2

    # Retro terminal colors: green/yellow active border, dark inactive border
    col.active_border = rgba(9ece6aff) rgba(e0af68ff) 45deg
    col.inactive_border = rgba(2a2a2aff)

    resize_on_border = true
    allow_tearing = false
    layout = dwindle
}

decoration {
    rounding = 3

    active_opacity = 1.0
    inactive_opacity = 0.88

    dim_inactive = true
    dim_strength = 0.16
    dim_around = 0.35

    shadow {
        enabled = true
        range = 10
        render_power = 2
        color = rgba(00000099)
        color_inactive = rgba(00000055)
    }

    blur {
        enabled = true
        size = 3
        passes = 1
        new_optimizations = true
        xray = false
        popups = true
    }
}

animations {
    enabled = yes

    # Snappy retro animations
    bezier = retro, 0.05, 0.75, 0.25, 1.0
    bezier = retroFade, 0.25, 0.1, 0.25, 1.0

    animation = windows, 1, 2, retro, popin 92%
    animation = windowsIn, 1, 2, retro, popin 92%
    animation = windowsOut, 1, 2, retroFade, popin 96%
    animation = windowsMove, 1, 2, retro, slide
    animation = fade, 1, 2, retroFade
    animation = workspaces, 1, 3, retro, slide
}

# Your repo already used this older gesture syntax, so this keeps compatibility.
gesture = 3, horizontal, workspace
gesture = 3, vertical, fullscreen

master {
    new_status = master
}

xwayland {
    force_zero_scaling = true
}

misc {
    disable_hyprland_logo = true
    disable_splash_rendering = true
    force_default_wallpaper = 0

    animate_manual_resizes = false

    enable_swallow = true
    swallow_regex = ^(ghostty|kitty)$
}
