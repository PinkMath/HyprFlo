################
### MONITORS ###
################

#workspaces 1

#workspaces 2
windowrule = workspace 2 silent, match:class spotify
windowrule = workspace 2 silent, match:class vesktop

#workspaces 3

#workspaces 4

#workspace 5

#MONITORS
monitor= HDMI-A-1, 1920x1080@74.97, 0x0, 1
#monitor=,preferred,auto,1

###################
###    FLOAT    ###
###################

windowrule = match:class blueman-manager, float on
windowrule = match:title Picture-in-Picture, float on
windowrule = match:class org.pulseaudio.pavucontrol, float on

##################
##  FULLSCREEN  ##
##################


###################
###   MAX  MIN  ###
###################

windowrule = max_size 535 300, match:title Picture-in-Picture
#windowrule = max_size 930 630, match:initialClass kitty

###################
### MY PROGRAMS ###
###################

#lanche
$terminal = kitty
$fileManager = nemo 
$browser = zen-browser
$menu = rofi -show drun
$wall = ~/.config/hypr/scripts/rofi-wallpaper.sh

#print
$print = hyprshot -m output -o ~/screenshot/output/
$printwindow = hyprshot -m window -o ~/screenshot/window/
$printregion = hyprshot -m region -o ~/screenshot/region/

#spotify
$pause = playerctl --player=spotify play-pause
$next_soung = playerctl --player=spotify next
$less_volume = playerctl --player=spotify volume 0.05-
$more_volume = playerctl --player=spotify volume 0.05+

#################
### AUTOSTART ###
#################

exec-once = swww-daemon &
exec-once = waybar &
exec-once = dunst &
exec-once = $browser &
exec-once = spotify &

#############################
### ENVIRONMENT VARIABLES ###
#############################

env = XCURSOR_SIZE,16
env = HYPRCURSOR_SIZE,16
env = XDG_CURRENT_DESKTOP,Hyprland
env = GDK_DPI_SCALE,1
env = XFT_DPI,96

#####################
### LOOK AND FEEL ###
#####################

general {
        gaps_in = 5
                gaps_out = 20

                border_size = 1

                col.active_border = rgb(110,140,250)
                col.inactive_border = rgba(595959aa)

                resize_on_border = false

                allow_tearing = false

                layout = dwindle
}

decoration {
        rounding = 1
                active_opacity = 1.0
                inactive_opacity = 1.0
                dim_inactive = false
                dim_strength = 0.19
                dim_around = 0.6
                shadow {
                        enabled = true
                                range = 13
                                render_power = 17
                                color = rgba(44220044)
                }

        blur {
                enabled = true
                        size = 5
                        passes = 4
                        new_optimizations = true
                        xray = true
                        popups = true
        }
}

animations {
        enabled = yes
                bezier = easeOutQuint, 0.22, 1, 0.36, 1
                bezier = easeInQuart, 0.89, 0.03, 0.68, 0.19
                bezier = softLinear, 0.1, 0.1, 1, 1

                animation = windows,     1, 3, easeOutQuint, popin 90%
                animation = windowsIn,   1, 3, easeOutQuint, popin 90%
                animation = windowsOut,  1, 2, easeInQuart, popin 95%
                animation = windowsMove, 1, 3, easeOutQuint, slide
                animation = fade,        1, 3, softLinear
                animation = workspaces,  1, 4, easeOutQuint, slidefade 20%
}

# Three Finger Gestures
gesture = 3, horizontal, workspace
gesture = 3, vertical, fullscreen

dwindle {
        pseudotile = true
                preserve_split = true
}

master {
        new_status = master
}

xwayland {
        force_zero_scaling = true
}

misc {
        disable_hyprland_logo = true
                disable_splash_rendering = true
                force_default_wallpaper = 0
                animate_manual_resizes = true
                enable_swallow = true
                swallow_regex = ^(kitty)$
}

#############
### INPUT ###
#############


input {
        kb_layout = us, br
                kb_variant =
                kb_model =
                kb_options = grp:alt_shift_toggle
                kb_rules =

                follow_mouse = 1

                sensitivity = 0 # -1.0 - 1.0, 0 means no modification.

                touchpad {
                        natural_scroll = true
                }
}

ecosystem {
        no_update_news = true
}

device {
        name = epic-mouse-v1
                sensitivity = 0.35

}

###################
### KEYBINDINGS ###
###################


$mainMod = SUPER # Sets "Windows" key
$mainAlt = ALT # Sets the "ALT" key


# LAUNCHE
bind = $mainAlt, S, exec, spotify
bind = $mainAlt, B, exec, $browser
bind = $mainAlt, D, exec, vesktop
bind = $mainMod, Space, exec, $menu
bind = $mainMod $mainAlt, Space, exec, $wall
bind = $mainMod, E, exec, $terminal
bind = $mainMod SHIFT, E, exec, nemo 


#spotify
bind = $mainAlt, left, exec, $pause
bind = $mainAlt, down, exec, $less_volume 
bind = $mainAlt, up, exec, $more_volume
bind = $mainAlt, right, exec, $next_soung


# PRINT
bind = $mainMod, X, exec, $printregion
bind = $mainMod, Z, exec, $print
bind = $mainMod, C, exec, $printwindow


# WINDOWS
bind = $mainMod, Q, killactive
bind = $mainMod, F, togglefloating
bind = $mainMod, I, fullscreen
bind = $mainMod SHIFT, h, swapwindow, l
bind = $mainMod SHIFT, l, swapwindow, r
bind = $mainMod SHIFT, k, swapwindow, u
bind = $mainMod SHIFT, j, swapwindow, d
bind = $mainMod, h, movefocus, l
bind = $mainMod, l, movefocus, r
bind = $mainMod, k, movefocus, u
bind = $mainMod, j, movefocus, d


# WORKSPACES
bind = $mainMod, 1, workspace, 1
bind = $mainMod, 2, workspace, 2
bind = $mainMod, 3, workspace, 3
bind = $mainMod, 4, workspace, 4
bind = $mainMod, 5, workspace, 5
bind = $mainMod, 6, workspace, 6
bind = $mainMod, 7, workspace, 7
bind = $mainMod, 8, workspace, 8
bind = $mainMod, 9, workspace, 9
bind = $mainMod, 0, workspace, 10
bind = $mainMod $mainAlt, 1, movetoworkspace, 1
bind = $mainMod $mainAlt, 2, movetoworkspace, 2
bind = $mainMod $mainAlt, 3, movetoworkspace, 3
bind = $mainMod $mainAlt, 4, movetoworkspace, 4
bind = $mainMod $mainAlt, 5, movetoworkspace, 5
bind = $mainMod $mainAlt, 6, movetoworkspace, 6
bind = $mainMod $mainAlt, 7, movetoworkspace, 7
bind = $mainMod $mainAlt, 8, movetoworkspace, 8
bind = $mainMod $mainAlt, 9, movetoworkspace, 9
bind = $mainMod $mainAlt, 0, movetoworkspace, 10


# MOVE WINDOWS WITH THE MOUSE
bindm = $mainMod, mouse:272, movewindow
bindm = $mainMod, mouse:273, resizewindow


# Laptop multimedia keys for volume and LCD brightness
bindel = ,XF86AudioRaiseVolume, exec, wpctl set-volume -l 1 @DEFAULT_AUDIO_SINK@ 5%+
bindel = ,XF86AudioLowerVolume, exec, wpctl set-volume @DEFAULT_AUDIO_SINK@ 5%-
bindel = ,XF86AudioMute, exec, wpctl set-mute @DEFAULT_AUDIO_SINK@ toggle
bindel = ,XF86AudioMicMute, exec, wpctl set-mute @DEFAULT_AUDIO_SOURCE@ toggle
bindel = ,XF86MonBrightnessUp, exec, brightnessctl -e4 -n2 set 5%+
bindel = ,XF86MonBrightnessDown, exec, brightnessctl -e4 -n2 set 5%-


# Requires playerctl
bindl = , XF86AudioNext, exec, playerctl next
bindl = , XF86AudioPause, exec, playerctl play-pause
bindl = , XF86AudioPlay, exec, playerctl play-pause
bindl = , XF86AudioPrev, exec, playerctl previous
