#####################
### LOOK AND FEEL ###
#####################

general {
        gaps_in = 5
        gaps_out = 20

        border_size = 1

        col.active_border = rgb(110,140,250)
        col.inactive_border = rgba(595959aa)

        resize_on_border = false

        allow_tearing = false

        layout = dwindle
}

decoration {
        rounding = 1
        active_opacity = 1.0
        inactive_opacity = 1.0
        dim_inactive = false
        dim_strength = 0.19
        dim_around = 0.6
        shadow {
                enabled = true
                range = 13
                render_power = 17
                color = rgba(44220044)
        }

        blur {
                enabled = true
                size = 6
                passes = 2
                new_optimizations = true
                xray = true
                popups = true
        }
}

animations {
        enabled = yes
        bezier = easeOutQuint, 0.22, 1, 0.36, 1
        bezier = easeInQuart, 0.89, 0.03, 0.68, 0.19
        bezier = softLinear, 0.1, 0.1, 1, 1

        animation = windows,     1, 3, easeOutQuint, popin 90%
        animation = windowsIn,   1, 3, easeOutQuint, popin 90%
        animation = windowsOut,  1, 2, easeInQuart, popin 95%
        animation = windowsMove, 1, 3, easeOutQuint, slide
        animation = fade,        1, 3, softLinear
        animation = workspaces,  1, 4, easeOutQuint, slidefade 20%
}

# Three Finger Gestures
gesture = 3, horizontal, workspace
gesture = 3, vertical, fullscreen

dwindle {
        pseudotile = true
        preserve_split = true
}

master {
        new_status = master
}

xwayland {
        force_zero_scaling = true
}

misc {
        disable_hyprland_logo = true
        disable_splash_rendering = true
        force_default_wallpaper = 0
        animate_manual_resizes = true
        enable_swallow = true
        swallow_regex = ^(kitty)$
}

#############
### INPUT ###
#############


input {
        kb_layout = us, br
        kb_variant =
        kb_model =
        kb_options = grp:alt_shift_toggle
        kb_rules =

        follow_mouse = 1

        sensitivity = 0 # -1.0 - 1.0, 0 means no modification.

        touchpad {
                natural_scroll = true
        }
}

ecosystem {
        no_update_news = true
}

device {
        name = epic-mouse-v1
        sensitivity = 0.35

}
