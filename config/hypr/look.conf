#####################
### LOOK AND FEEL ###
#####################


general {
        gaps_in = 4
        gaps_out = 10

        border_size = 2

        col.active_border = rgba(7aa2f7ff)
        col.inactive_border = rgba(44475aaa)

        resize_on_border = true
        allow_tearing = false

        layout = dwindle
}

decoration {
        rounding = 6

        active_opacity = 1.0
        inactive_opacity = 0.92

        dim_inactive = true
        dim_strength = 0.08
        dim_around = 0.4

        shadow {
                enabled = true
                range = 18
                render_power = 25
                color = rgba(00000055)
        }

        blur {
                enabled = true
                size = 8
                passes = 3
                new_optimizations = true
                xray = false
                popups = true
        }
}

animations {
        enabled = yes

        # Smoother curves
        bezier = easeOutQuint, 0.23, 1, 0.32, 1
        bezier = easeInOutCubic, 0.65, 0.05, 0.36, 1
        bezier = softLinear, 0.25, 0.25, 0.75, 0.75

        # Faster + more fluid
        animation = windows,     1, 4, easeOutQuint, popin 85%
        animation = windowsIn,   1, 4, easeOutQuint, popin 85%
        animation = windowsOut,  1, 3, easeInOutCubic, popin 90%
        animation = windowsMove, 1, 4, easeOutQuint, slide
        animation = fade,        1, 3, softLinear
        animation = workspaces,  1, 5, easeOutQuint, slidefade 15%
}

gesture = 3, horizontal, workspace
gesture = 3, vertical, fullscreen

dwindle {
        pseudotile = true
        preserve_split = true
}

master {
        new_status = master
}

xwayland {
        force_zero_scaling = true
}

misc {
        disable_hyprland_logo = true
        disable_splash_rendering = true
        force_default_wallpaper = 0
        animate_manual_resizes = true
        enable_swallow = true
        swallow_regex = ^(ghostty)$
}

workspace = w[tv1], gapsout:5, gapsin:0
