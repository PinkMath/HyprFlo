#############################
### ENVIRONMENT VARIABLES ###
#############################

env = XCURSOR_SIZE,16
env = HYPRCURSOR_SIZE,16
env = XDG_CURRENT_DESKTOP,Hyprland
env = GDK_DPI_SCALE,1
env = XFT_DPI,96

#############
### INPUT ###
#############

input {
        kb_layout = us, br
        kb_variant =
        kb_model =
        kb_options = grp:alt_shift_toggle
        kb_rules =

        follow_mouse = 1

        sensitivity = 0 # -1.0 - 1.0, 0 means no modification.

        touchpad {
                natural_scroll = true
        }
}

ecosystem {
        no_update_news = true
}

device {
        name = epic-mouse-v1
        sensitivity = 0.35

}
